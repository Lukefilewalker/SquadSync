{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Add Player</h2>
    <form class="inline" method="post" action="/players/add">
        <input name="name" placeholder="Name" required>
        <button>Add</button>
    </form>
</div>

<h2>Players</h2>
<ul>
{% for player in players %}
    <li>{{ player.name }}</li>
{% endfor %}
</ul>

{% endblock %}
