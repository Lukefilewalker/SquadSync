{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Add Player</h2>
    <form class="inline" method="post" action="/players/add">
        <input name="name" placeholder="Name" required>
        <button>Add</button>
    </form>
</div>

<h2>Players</h2>

{% for player in players %}
<div class="card">
    <div class="grid">
        <div>
            <form method="post" action="/players/update">
                <input type="hidden" name="player_id" value="{{ player.id }}">

                <label class="small">Display Name</label><br>
                <input name="name" value="{{ player.name }}" required><br><br>

                <label class="small">Preferred Voice</label><br>
                <select name="preferred_voice">
                    {% for option in voice_options %}
                        <option value="{{ option }}" {% if player.preferred_voice == option %}selected{% endif %}>
                            {{ option }}
                        </option>
                    {% endfor %}
                </select><br><br>

                <button type="submit">Save Player</button>
            </form>
        </div>

        <div>
            <form method="post" action="/players/update">
                <input type="hidden" name="player_id" value="{{ player.id }}">
                <input type="hidden" name="name" value="{{ player.name }}">
                <input type="hidden" name="preferred_voice" value="{{ player.preferred_voice }}">

                <label class="small">Xbox Gamertag</label><br>
                <input name="xbox_gamertag" value="{{ player.xbox_gamertag }}" placeholder="Xbox name"><br><br>

                <label class="small">Discord Username</label><br>
                <input name="discord_username" value="{{ player.discord_username }}" placeholder="Discord name"><br><br>

                <label class="small">Twitch Username</label><br>
                <input name="twitch_username" value="{{ player.twitch_username }}" placeholder="Twitch name"><br><br>

                <label class="small">Notes</label><br>
                <input name="notes" value="{{ player.notes }}" placeholder="Optional notes"><br><br>

                <button type="submit">Save Contact Info</button>
            </form>
        </div>

        <div>
            <label class="small">Current Squad</label><br>

            {% if player.active_tonight %}
                <span class="status-installed">In Current Squad</span><br><br>
                <form method="post" action="/players/set-active">
                    <input type="hidden" name="player_id" value="{{ player.id }}">
                    <input type="hidden" name="active_tonight" value="0">
                    <button type="submit">Remove from Squad</button>
                </form>
            {% else %}
                <span class="status-not-owned">Not in Current Squad</span><br><br>
                <form method="post" action="/players/set-active">
                    <input type="hidden" name="player_id" value="{{ player.id }}">
                    <input type="hidden" name="active_tonight" value="1">
                    <button type="submit">Add to Squad</button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
{% endfor %}

{% endblock %}
